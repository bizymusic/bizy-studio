<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIDI可视化</title>

  <!-- 样式 -->
  <link rel="stylesheet" href="./visualizer.css" />
</head>

<body>

  <!-- 控制面板 -->
  <div class="panel">

    <div class="row">
      <input type="file" id="fileInput" accept=".mid,.midi" />
    </div>

    <div class="row">
      <label>BPM</label>
      <input type="number" id="bpmInput" placeholder="自动读取" />
      <button id="applyBpmBtn">应用</button>
    </div>

    <div class="row">
      <label>横向缩放</label>
      <input type="range" id="scaleSlider" min="20" max="300" value="60" />
      <span id="scaleValue">60</span>
    </div>

    <div class="row">
      <label>纵向缩放</label>
      <input type="range" id="verticalSlider" min="2" max="20" value="8" />
      <span id="verticalValue">8</span>
    </div>

    <div class="row">
      <label>高亮时间</label>
      <input type="number" id="highlightInput" step="0.01" min="0.01" value="0.20" />
    </div>

    <div class="row buttons">
      <button id="startBtn">开始</button>
      <button id="pauseBtn">暂停</button>
      <button id="resetBtn">重置</button>
      <button id="replayBtn">重播</button>

      <label class="toggle">
        <input type="checkbox" id="particleToggle">
        粒子
      </label>
    </div>

  </div>

  <!-- 可视化区域 -->
  <div id="noteContainerWrapper">
    <div id="noteContainer">
      <div id="playhead"></div>
    </div>
  </div>

  <!-- ✅ 关键：module + 放底部 -->
  <script type="module" src="./visualizer.js"></script>

</body>
</html>
